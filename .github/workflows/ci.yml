name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nexdrop
          POSTGRES_USER: nexdrop
          POSTGRES_PASSWORD: nexdrop-secret
        ports:
          - 5432:5432
        options: --health-cmd='pg_isready -U nexdrop' --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm exec prisma generate
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Run unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.ts
