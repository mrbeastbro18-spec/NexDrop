name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://nexdrop:nexdrop-secret@localhost:5432/nexdrop?schema=public
      JWT_ACCESS_SECRET: test-access-secret-123456789012345678901234
      JWT_REFRESH_SECRET: test-refresh-secret-123456789012345678901234
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: test
      SMTP_PASS: test
      EMAIL_FROM: "NexDrop <noreply@example.com>"
      STORAGE_PATH: ./storage
      TEMP_UPLOAD_PATH: ./storage/tmp
      S3_ENABLED: false
      EMAIL_QUEUE_ENABLED: false
      ADMIN_EMAILS: admin@example.com
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nexdrop
          POSTGRES_USER: nexdrop
          POSTGRES_PASSWORD: nexdrop-secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nexdrop"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm exec prisma generate
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Run unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.ts
